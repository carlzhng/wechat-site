<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="format-detection" content="telephone=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Our Store</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/styles/main.css" />
  </head>
  <body>
    <div id="app">
      <!-- Sidebar overlay (mobile) -->
      <div class="sidebar-overlay" id="sidebar-overlay" aria-hidden="true"></div>

      <!-- Sidebar -->
      <aside class="sidebar" id="sidebar" aria-label="Store categories">
        <div class="sidebar-header">
          <div class="store-brand">
            <span class="store-logo" aria-hidden="true">🛍</span>
            <div>
              <h1 class="store-name">Our Store</h1>
              <p class="store-tagline">Browse our collection</p>
            </div>
          </div>
          <button
            class="sidebar-close"
            id="sidebar-close"
            aria-label="Close menu"
            type="button"
          >
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M18 6L6 18M6 6l12 12" />
            </svg>
          </button>
        </div>

        <nav class="sidebar-nav" id="sidebar-nav"></nav>

        <div class="sidebar-footer">
          <p class="browse-notice">
            This is a catalog for browsing only.<br />
            Contact us to place an order.
          </p>
        </div>
      </aside>

      <!-- Main content -->
      <main class="main">
        <header class="topbar">
          <button
            class="menu-btn"
            id="menu-btn"
            aria-label="Open menu"
            aria-expanded="false"
            type="button"
          >
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 12h18M3 6h18M3 18h18" />
            </svg>
          </button>
          <div class="topbar-title" id="topbar-title">Clothing & Apparel</div>
          <div class="topbar-spacer"></div>
        </header>

        <section class="category-hero" id="category-hero"></section>

        <section class="products-section">
          <div class="products-grid" id="products-grid"></div>
        </section>
      </main>

      <!-- Product detail modal -->
      <div class="modal" id="product-modal" aria-hidden="true" role="dialog" aria-modal="true">
        <div class="modal-backdrop" id="modal-backdrop"></div>
        <div class="modal-panel">
          <button class="modal-close" id="modal-close" aria-label="Close product details" type="button">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M18 6L6 18M6 6l12 12" />
            </svg>
          </button>
          <div class="modal-content" id="modal-content"></div>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
