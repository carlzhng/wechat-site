<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="format-detection" content="telephone=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>店铺</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap"
      rel="stylesheet"
    />
    <script type="module" crossorigin src="/wechat-site/assets/main-BXEGz2To.js"></script>
    <link rel="modulepreload" crossorigin href="/wechat-site/assets/api-C0awQeH6.js">
    <link rel="stylesheet" crossorigin href="/wechat-site/assets/main--QpY3tBV.css">
  </head>
  <body>
    <div id="app">
      <!-- Sidebar overlay (mobile) -->
      <div class="sidebar-overlay" id="sidebar-overlay" aria-hidden="true"></div>

      <!-- Sidebar -->
      <aside class="sidebar" id="sidebar" aria-label="店铺分类">
        <div class="sidebar-header">
          <div class="store-brand">
            <span class="store-logo" aria-hidden="true">🛍</span>
            <div>
              <h1 class="store-name">加拿大优选生活馆</h1>
              <p class="store-tagline">浏览商品</p>
            </div>
          </div>
          <button
            class="sidebar-close"
            id="sidebar-close"
            aria-label="关闭菜单"
            type="button"
          >
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M18 6L6 18M6 6l12 12" />
            </svg>
          </button>
        </div>

        <nav class="sidebar-nav" id="sidebar-nav"></nav>

        <div class="sidebar-footer">
          <p class="browse-notice">
            本网站仅供浏览展示。<br />
            下单请联系微信。
          </p>
        </div>
      </aside>

      <!-- Main content -->
      <main class="main">
        <header class="topbar">
          <button
            class="menu-btn"
            id="menu-btn"
            aria-label="打开菜单"
            aria-expanded="false"
            type="button"
          >
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 12h18M3 6h18M3 18h18" />
            </svg>
          </button>
          <div class="topbar-center">
            <h1 class="topbar-store-name" id="topbar-store-name">🍁加拿大优选生活馆 • 加拿大正品代购 • 本地采购直邮🍁</h1>
            <p class="topbar-brands" id="topbar-brands"></p>
          </div>
          <div class="topbar-spacer" aria-hidden="true"></div>
        </header>

        <section class="brand-gallery" aria-label="精选服饰品牌">
          <div class="brand-gallery-track" id="brand-gallery-track"></div>
        </section>

        <section class="store-intro" aria-label="店铺介绍与健康精选">
          <div class="health-poster health-poster--left" id="health-poster-left"></div>
          <div class="store-intro-center" id="store-intro-center"></div>
          <div class="health-poster health-poster--right" id="health-poster-right"></div>
        </section>

        <section class="category-hero" id="category-hero"></section>

        <section class="products-section">
          <div class="products-container" id="products-container"></div>
        </section>
      </main>

      <!-- Product detail modal -->
      <div class="modal" id="product-modal" aria-hidden="true" role="dialog" aria-modal="true">
        <div class="modal-backdrop" id="modal-backdrop"></div>
        <div class="modal-panel">
          <button class="modal-close" id="modal-close" aria-label="关闭商品详情" type="button">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M18 6L6 18M6 6l12 12" />
            </svg>
          </button>
          <div class="modal-content" id="modal-content"></div>
        </div>
      </div>
    </div>

  </body>
</html>
